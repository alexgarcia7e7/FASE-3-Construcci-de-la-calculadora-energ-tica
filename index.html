<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ASG ITB - Datos Reales</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --itb-blue: #004a99; --itb-green: #28a745; --itb-light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--itb-light); margin: 0; padding-bottom: 50px; }
        header { background: var(--itb-blue); color: white; padding: 1.5rem; text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }
        .nav-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .selector-temporal { display: flex; gap: 5px; }
        button, .btn-upload { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; background: #eee; font-weight: bold; transition: 0.3s; font-size: 0.9rem; }
        button.active { background: var(--itb-blue); color: white; }
        .btn-upload { background: var(--itb-green); color: white; }
        #file-input { display: none; }
        .grid-calculadora { display: grid; grid-template-columns: repeat(auto-fit, minmax(480px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid var(--itb-blue); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f2f2f2; padding: 10px; font-size: 0.85rem; }
        td { text-align: left; padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .val-total { font-weight: bold; color: var(--itb-blue); text-align: right; }
        .val-lectivo { font-weight: bold; color: var(--itb-green); text-align: right; }
        .label-sub { display: block; font-size: 0.75rem; color: #777; font-weight: normal; }
    </style>
</head>
<body>

<header>
    <h1>Calculadora de Sostenibilidad ITB</h1>
    <div id="load-status" style="font-size: 0.8rem; opacity: 0.8; margin-top: 5px;">Vinculado a dataclean.json (v2.0)</div>
</header>

<div class="container">
    <div class="nav-controls">
        <div class="selector-temporal">
            <button onclick="updateView('past')" id="btn-past">Año Pasado</button>
            <button onclick="updateView('current')" id="btn-current" class="active">Este Año</button>
            <button onclick="updateView('future')" id="btn-future">Próximo Año</button>
        </div>
        <label for="file-input" class="btn-upload"><i class="fas fa-file-import"></i> Actualizar JSON</label>
        <input type="file" id="file-input" accept=".json" onchange="handleFileUpload(event)">
    </div>

    <div class="grid-calculadora" id="main-grid"></div>
</div>

<script>
    let rawData = null;
    let currentMode = 'current';

    async function loadInitialData() {
        try {
            const response = await fetch('datos/dataclean.json');
            if(response.ok) { rawData = await response.json(); render(); }
        } catch (e) { document.getElementById('main-grid').innerHTML = "<p style='text-align:center; width:100%;'>Sube el archivo JSON actualizado para ver los nuevos cálculos.</p>"; }
    }

    function handleFileUpload(event) {
        const file = event.target.files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            rawData = JSON.parse(e.target.result);
            document.getElementById('load-status').innerText = "Archivo: " + file.name;
            render();
        };
        reader.readAsText(file);
    }

    function updateView(mode) {
        currentMode = mode;
        document.querySelectorAll('.selector-temporal button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        render();
    }

    function render() {
        if (!rawData) return;
        const mult = currentMode === 'past' ? 0.94 : (currentMode === 'future' ? 1.06 : 1);

        const elec = rawData.indicadors.find(i => i.id === "IND01");
        const aigua = rawData.indicadors.find(i => i.id === "IND02");
        const material = rawData.indicadors.find(i => i.id === "IND03");
        const neteja = rawData.indicadors.find(i => i.id === "IND04");

        // 1. Electricidad (Basado en el Consumo ITB Anual de 170.000 kWh)
        const elecAnual = elec.dades.total_consum_itb_anual * mult;

        // 2. Agua (Basado en el Total Anual del JSON)
        const aguaAnual = aigua.total_anual * mult;

        // 3. Material (Cálculo basado en la media mensual del JSON)
        const paperMedia = material.dades_anuals.reduce((a,b) => a + b.paper_a4_paquets, 0) / material.dades_anuals.length;
        const paperAnual = (paperMedia * 12) * mult;

        // 4. Limpieza (Basado en detall_mensual)
        const detAnual = neteja.detall_mensual.detergent_multiusos * 12 * mult;
        const desAnual = neteja.detall_mensual.desinfectant * 12 * mult;
        const wcAnual = neteja.detall_mensual.paper_higienic_rotllos * 12 * mult;

        const grid = document.getElementById('main-grid');
        grid.innerHTML = `
            <div class="card">
                <h3><i class="fas fa-bolt"></i> Energía Eléctrica</h3>
                <table>
                    <thead><tr><th>Indicador</th><th>Gasto Anual</th><th>Sep - Jun</th></tr></thead>
                    <tr><td>Consumo ITB <span class="label-sub">(Red + Solar)</span></td><td class="val-total">${elecAnual.toLocaleString()} kWh</td><td class="val-lectivo">${(elecAnual * 0.88).toLocaleString()} kWh</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-tint"></i> Consumo de Agua</h3>
                <table>
                    <thead><tr><th>Indicador</th><th>Gasto Anual</th><th>Sep - Jun</th></tr></thead>
                    <tr><td>Agua de Red</td><td class="val-total">${aguaAnual.toFixed(1)} m³</td><td class="val-lectivo">${(aguaAnual * 0.9).toFixed(1)} m³</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-copy"></i> Material de Oficina</h3>
                <table>
                    <thead><tr><th>Concepto</th><th>Gasto Anual</th><th>Sep - Jun</th></tr></thead>
                    <tr><td>Papel A4 <span class="label-sub">(Paquetes de 500)</span></td><td class="val-total">${Math.round(paperAnual)} u.</td><td class="val-lectivo">${Math.round(paperAnual * 0.95)} u.</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-shining"></i> Productos Limpieza</h3>
                <table>
                    <thead><tr><th>Producto</th><th>Gasto Anual</th><th>Sep - Jun</th></tr></thead>
                    <tr><td>Detergente</td><td class="val-total">${detAnual.toFixed(1)} L</td><td class="val-lectivo">${(detAnual * 0.83).toFixed(1)} L</td></tr>
                    <tr><td>Desinfectante</td><td class="val-total">${desAnual.toFixed(1)} L</td><td class="val-lectivo">${(desAnual * 0.83).toFixed(1)} L</td></tr>
                    <tr><td>Papel Higiénico</td><td class="val-total">${Math.round(wcAnual)} u.</td><td class="val-lectivo">${Math.round(wcAnual * 0.83)} u.</td></tr>
                </table>
            </div>
        `;
    }
    loadInitialData();
</script>
</body>
</html>
