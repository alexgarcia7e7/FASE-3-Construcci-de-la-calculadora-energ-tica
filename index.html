<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ASG ITB - 1000 Alumnos (Mañana/Tarde)</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --itb-blue: #004a99; --itb-green: #28a745; --itb-light: #f8f9fa; --itb-orange: #f39c12; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--itb-light); margin: 0; padding-bottom: 50px; }
        header { background: var(--itb-blue); color: white; padding: 1.5rem; text-align: center; border-bottom: 5px solid var(--itb-orange); }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }

        .nav-controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .selector-temporal button { padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer; background: #eee; font-weight: bold; transition: 0.3s; }
        button.active { background: var(--itb-blue); color: white; }

        .grid-calculadora { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--itb-blue); }
        .card h3 { color: var(--itb-blue); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; gap: 10px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; background: #f2f2f2; padding: 10px; font-size: 0.85rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #eee; font-size: 0.9rem; }

        .val-total { font-weight: bold; color: var(--itb-blue); text-align: right; }
        .val-lectivo { font-weight: bold; color: var(--itb-green); text-align: right; }
        .row-total-gasto { background: #eef2f7; font-weight: bold; color: var(--itb-blue); }
        .label-sub { display: block; font-size: 0.75rem; color: #777; font-weight: normal; }

        .footer-info { text-align: center; color: #666; font-size: 0.85rem; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <h1>Calculadora de Sostenibilidad ITB</h1>
    <p>Análisis para 1.000 alumnos (Turnos Mañana y Tarde)</p>
</header>

<div class="container">
    <div class="nav-controls">
        <div class="selector-temporal">
            <button onclick="updateView('past')" id="btn-past">Año Pasado</button>
            <button onclick="updateView('current')" id="btn-current" class="active">Este Año (Real)</button>
            <button onclick="updateView('future')" id="btn-future">Proyección Próximo Año (-10%)</button>
            <button onclick="updateView('goal')" id="btn-goal">Meta 3 Años (-30%)</button>
        </div>
    </div>

    <div class="grid-calculadora" id="main-grid"></div>

    <div class="footer-info">
        * Datos ajustados según capacidad operativa de 1.000 usuarios y actividad IT ininterrumpida de 08:00 a 21:00.
    </div>
</div>

<script>
    let currentMode = 'current';

    function updateView(mode) {
        currentMode = mode;
        document.querySelectorAll('.selector-temporal button').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        render();
    }

    function getMultiplier() {
        if (currentMode === 'past') return 1.05;
        if (currentMode === 'future') return 0.90;
        if (currentMode === 'goal') return 0.70;
        return 1.0;
    }

    function render() {
        const m = getMultiplier();
        const grid = document.getElementById('main-grid');

        // Datos base ajustados a 1000 alumnos
        const baseElec = 158500;
        const baseAgua = 950; // Ajustado al rango de 800-1200m3 por volumen de alumnado

        grid.innerHTML = `
            <div class="card">
                <h3><i class="fas fa-bolt"></i> Energía Eléctrica</h3>
                <table>
                    <thead><tr><th>Indicador</th><th>Gasto Anual</th><th>Sept - Jun (Lectivo)</th></tr></thead>
                    <tr><td>Consumo Total ITB <span class="label-sub">Dato real centro informático</span></td><td class="val-total">${(baseElec * m).toLocaleString()} kWh</td><td class="val-lectivo">${(baseElec * m * 0.88).toLocaleString()} kWh</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-tint"></i> Agua</h3>
                <table>
                    <thead><tr><th>Indicador</th><th>Gasto Anual</th><th>Sept - Jun (Lectivo)</th></tr></thead>
                    <tr><td>Agua <span class="label-sub">Ajustado a 1000 usuarios</span></td><td class="val-total">${(baseAgua * m).toFixed(1)} m³</td><td class="val-lectivo">${(baseAgua * m * 0.9).toFixed(1)} m³</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-copy"></i> Material de oficina</h3>
                <table>
                    <thead><tr><th>Elemento</th><th>Anual (12m)</th><th>Lectivo</th><th>Gasto (€)</th></tr></thead>
                    <tr><td>Papel A4 Blanco</td><td>${Math.round(495 * m)} paq</td><td>${Math.round(470 * m)} paq</td><td class="val-total">${(2079 * m).toFixed(2)} €</td></tr>
                    <tr><td>Recambios Pizarra</td><td>${Math.round(120 * m)} ud</td><td>${Math.round(115 * m)} ud</td><td class="val-total">${(132 * m).toFixed(2)} €</td></tr>
                    <tr><td>Carpetas/Subcarpetas</td><td>${Math.round(250 * m)} ud</td><td>${Math.round(250 * m)} ud</td><td class="val-total">${(62.5 * m).toFixed(2)} €</td></tr>
                    <tr class="row-total-gasto"><td>TOTAL OFICINA</td><td>-</td><td>-</td><td class="val-total">${(2273.5 * m).toFixed(2)} €</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-shining"></i> Material de limpieza</h3>
                <table>
                    <thead><tr><th>Elemento</th><th>Anual (12m)</th><th>Lectivo</th><th>Gasto (€)</th></tr></thead>
                    <tr><td>Detergente Multiusos</td><td>${(150 * m).toFixed(1)} L</td><td>${(125 * m).toFixed(1)} L</td><td class="val-total">${(270 * m).toFixed(2)} €</td></tr>
                    <tr><td>Desinfectante</td><td>${(96 * m).toFixed(1)} L</td><td>${(80 * m).toFixed(1)} L</td><td class="val-total">${(307.2 * m).toFixed(2)} €</td></tr>
                    <tr><td>Papel Higiénico</td><td>${Math.round(1140 * m)} ud</td><td>${Math.round(950 * m)} ud</td><td class="val-total">${(433.2 * m).toFixed(2)} €</td></tr>
                    <tr><td>Jabón de manos</td><td>${(120 * m).toFixed(1)} L</td><td>${(100 * m).toFixed(1)} L</td><td class="val-total">${(252 * m).toFixed(2)} €</td></tr>
                    <tr class="row-total-gasto"><td>TOTAL LIMPIEZA</td><td>-</td><td>-</td><td class="val-total">${(1262.4 * m).toFixed(2)} €</td></tr>
                </table>
            </div>
        `;
    }

    render();
</script>
</body>
</html>
