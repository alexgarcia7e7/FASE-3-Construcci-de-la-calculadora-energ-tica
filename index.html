<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora ASG Dinámica - ITB</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --itb-blue: #004a99; --itb-green: #28a745; --itb-light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--itb-light); margin: 0; padding-bottom: 50px; }
        header { background: var(--itb-blue); color: white; padding: 1.5rem; text-align: center; }
        .container { max-width: 1100px; margin: 20px auto; padding: 0 20px; }

        /* Contenedor del Navegador/Selector */
        .nav-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            flex-wrap: wrap;
        }

        .selector-temporal { display: flex; gap: 5px; }

        button, .btn-upload {
            padding: 10px 18px; border: none; border-radius: 5px; cursor: pointer;
            background: #eee; font-weight: bold; transition: 0.3s; font-size: 0.9rem;
            display: flex; align-items: center; gap: 8px;
        }
        button.active { background: var(--itb-blue); color: white; }
        button:hover:not(.active) { background: #ddd; }

        /* Estilo especial para el botón de subida */
        .btn-upload { background: var(--itb-green); color: white; }
        .btn-upload:hover { background: #218838; }
        #file-input { display: none; } /* Escondemos el input real */

        .grid-calculadora {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(450px, 1fr)); gap: 20px;
        }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card h3 { color: var(--itb-blue); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #eee; }
        .val-destacado { font-weight: bold; color: var(--itb-green); font-size: 1.1rem; }

        .status-msg { font-size: 0.8rem; color: #666; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Calculadora de Sostenibilidad ITB</h1>
    <div class="status-msg" id="load-status">Fuente: datos/dataclean.json</div>
</header>

<div class="container">
    <div class="nav-controls">
        <div class="selector-temporal">
            <button onclick="updateView('past')" id="btn-past">Año Pasado</button>
            <button onclick="updateView('current')" id="btn-current" class="active">Este Año</button>
            <button onclick="updateView('future')" id="btn-future">Próximo Año</button>
        </div>

        <label for="file-input" class="btn-upload">
            <i class="fas fa-file-import"></i> Inserta tu archivo (.json)
        </label>
        <input type="file" id="file-input" accept=".json" onchange="handleFileUpload(event)">
    </div>

    <div class="grid-calculadora" id="main-grid">
        <p style="text-align:center;">Cargando datos...</p>
    </div>
</div>

<script>
    let rawData = null;
    let currentMode = 'current';

    // 1. CARGA INICIAL (JSON LOCAL)
    async function loadInitialData() {
        try {
            const response = await fetch('datos/dataclean.json');
            if(response.ok) {
                rawData = await response.json();
                renderCalculadora();
            } else {
                throw new Error("No se encontró el archivo local");
            }
        } catch (error) {
            document.getElementById('main-grid').innerHTML = `
                <div style="text-align:center; grid-column: 1/-1; padding: 40px;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: #ccc;"></i>
                    <p>No hay datos cargados. Por favor, <b>inserta tu archivo JSON</b> para empezar.</p>
                </div>`;
        }
    }

    // 2. FUNCIÓN PARA GESTIONAR LA SUBIDA DEL ARCHIVO
    function handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const json = JSON.parse(e.target.result);
                rawData = json; // Sobreescribimos los datos con el nuevo archivo
                document.getElementById('load-status').innerHTML = `Archivo cargado: <b>${file.name}</b>`;
                renderCalculadora();
            } catch (err) {
                alert("Error: El archivo no es un JSON válido.");
            }
        };
        reader.readAsText(file);
    }

    function updateView(mode) {
        currentMode = mode;
        document.querySelectorAll('.selector-temporal button').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        renderCalculadora();
    }

    function getMultiplier() {
        if (currentMode === 'past') return 0.92; // Simulación año pasado
        if (currentMode === 'future') return 1.08; // Simulación futuro
        return 1;
    }

    // 3. RENDERIZADO CON DESGLOSE DETALLADO
    function renderCalculadora() {
        if (!rawData) return;
        const mult = getMultiplier();
        const grid = document.getElementById('main-grid');

        // Buscamos los indicadores en el JSON subido
        const solar = rawData.indicadors.find(i => i.id === "IND01") || { dades_mensuals: { gener: 0 }};
        const aigua = rawData.indicadors.find(i => i.id === "IND02");
        const paper = rawData.indicadors.find(i => i.id === "IND03");
        const neteja = rawData.indicadors.find(i => i.id === "IND04");

        const totalAigua = aigua ? Object.values(aigua.dades_trimestrals).reduce((a,b) => a+b, 0) : 0;

        grid.innerHTML = `
            <div class="card">
                <h3><i class="fas fa-bolt"></i> Energía (ITB)</h3>
                <table>
                    <tr><td>Generación Solar Media</td><td class="val-destacado">${(solar.dades_mensuals.gener * mult).toFixed(2)} kWh/mes</td></tr>
                    <tr><td>Consumo IT Estimado</td><td class="val-destacado">${(5200 * mult).toFixed(2)} kWh/mes</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-tint"></i> Consumo de Agua</h3>
                <table>
                    <tr><td>Anual Total</td><td class="val-destacado">${(totalAigua * mult).toFixed(2)} m³</td></tr>
                    <tr><td>Período Sep-Jun</td><td class="val-destacado">${(totalAigua * 0.85 * mult).toFixed(2)} m³</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-box-open"></i> Material de Oficina</h3>
                <table>
                    <tr><td>Papel A4 (Paquetes)</td><td class="val-destacado">${(420 * mult).toFixed(0)} u.</td></tr>
                    <tr><td>Bolígrafos/Material</td><td class="val-destacado">${(85 * mult).toFixed(0)} u.</td></tr>
                    <tr><td>Tóner Impresora</td><td class="val-destacado">${(12 * mult).toFixed(0)} u.</td></tr>
                </table>
            </div>

            <div class="card">
                <h3><i class="fas fa-shining"></i> Productos Limpieza</h3>
                <table>
                    <tr><td>Detergente</td><td class="val-destacado">${(neteja.detall.detergent * 12 * mult).toFixed(1)} L</td></tr>
                    <tr><td>Desinfectante</td><td class="val-destacado">${(neteja.detall.desinfectant * 12 * mult).toFixed(1)} L</td></tr>
                    <tr><td>Papel Higiénico</td><td class="val-destacado">${(neteja.detall.paper_wc * 12 * mult).toFixed(0)} rollos</td></tr>
                </table>
            </div>
        `;
    }

    loadInitialData();
</script>

</body>
</html>
